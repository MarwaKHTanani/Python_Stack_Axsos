<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>checkerboard</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="{{url_for('static',filename='style.css')}}"
    />
  </head>
  <body>
    <h1>Checkerboard</h1>
    <div class="container">
      {%for i in range(x)%}
      <div class="row">
        {% for j in range(y) %}
        <div
          class="box"
          style="background-color:{{'white' if (i+j)%2==0 else 'black'}}"
        ></div>
        {%endfor%}
      </div>
      {%endfor%}
    </div>
  </body>
</html>
